<!DOCTYPE html>
<html lang="{{ .Language }}">

{{ template "head.tpl.html" . }}

<body class="bg-background text-muted p-4 pt-10 flex flex-col min-h-screen max-w-screen-lg mx-auto justify-center">

{{ template "header.tpl.html" . }}

{{ template "alerts.tpl.html" . }}

<main class="mt-10 grow flex justify-center w-full">
    <div class="grow max-w-lg mt-10">
        <div class="mb-8">
            <h1 class="h1">{{ .T "reset_password.title" }}</h1>
            <span class="h1-subcaption">
                {{ .T "reset_password.subtitle" }}
            </span>
        </div>
        <form action="reset-password" method="post">
            <p class="text-sm text-white mb-8"></p>
            <div class="mb-4">
                <input class="input-default"
                       type="email" id="email"
                       name="email" placeholder="{{ .T "reset_password.email_placeholder" }}" minlength="1" required autofocus>
            </div>
            <div class="flex justify-end items-center">
                <button type="submit" class="btn-primary">{{ .T "reset_password.submit" }}</button>
            </div>
        </form>
    </div>
</main>

{{ template "footer.tpl.html" . }}

{{ template "foot.tpl.html" . }}
</body>

</html>
